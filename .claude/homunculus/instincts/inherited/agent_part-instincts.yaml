# Agent_part Workflow Add Or Update Provider Client

## Action

Follow the add-or-update-provider-client workflow:
1. Create or update client implementation in src/clients/
2. Update agent(s) in src/agents/ to use the new or updated client
3. Update or create provider result handling in src/clients/provider_result.py
4. Add or update tests in tests/test_agents/ to cover real, mock, and failure scenarios
5. Update documentation (system design, diagrams) to reflect new provider/client
6. Update dependencies if required (e.g., pyjwt in pyproject.toml)
7. Update __init__.py files as needed for imports

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/clients/*.py, src/agents/*_generator.py, src/clients/provider_result.py

